<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PixlArt — бесплатный онлайн пиксельный редактор для создания спрайтов и ретро-арта">
    <title>PixlArt — Пиксельный редактор</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">PixlArt</div>
        <button onclick="scrollToEditor()" class="btn">Открыть редактор</button>
    </nav>

    <section id="hero">
        <div class="hero-content">
            <h1 class="logo-big">PIXEL ART</h1>
            <p>Мощный и удобный редактор для создания пиксель-арта, спрайтов и ретро-графики</p>
            <button onclick="scrollToEditor()" class="btn main-btn">Начать творить</button>
        </div>
    </section>

    <section id="editor-section">
        <h2>Пиксельный Редактор</h2>
        <div class="editor-container">
            <div class="toolbar">
                <button class="tool-btn active" id="tool-pencil" onclick="selectTool('pencil')">✏️ Карандаш</button>
                <button class="tool-btn" id="tool-eraser" onclick="selectTool('eraser')">🧼 Ластик</button>
                <button class="tool-btn" id="tool-fill" onclick="selectTool('fill')">🪣 Заливка</button>
                <button onclick="clearGrid()" class="tool-btn">🗑 Очистить</button>
                <button onclick="downloadImage()" class="tool-btn">⬇️ Скачать PNG</button>
            </div>

            <div class="canvas-container">
                <div id="pixel-grid"></div>
            </div>

            <div class="palette-panel">
                <h3>Палитра</h3>
                <div id="palette" class="palette"></div>
                <select id="grid-size" onchange="changeGridSize()">
                    <option value="16">16×16</option>
                    <option value="32" selected>32×32</option>
                    <option value="48">48×48</option>
                </select>
            </div>
        </div>
    </section>

    <footer>
        <p>© PixlArt — Командный проект Борзенко Владислав & Байбара Максим</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
